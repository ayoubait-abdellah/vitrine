# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: ./mon-portfolio/dist

jobs:
# Please do not rename this job
  build-project:
    name: build vitrine
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: v20

      - name: Build Node assets
        env:
          CI: true
          SITE_URL: ${{ inputs.site-url }}
          VITE_EMAILJS_PUBLIC_KEY: 0ZSANdlYDqJPvciFX
          VITE_EMAILJS_SERVICE_ID: service_4p2m6a4
          VITE_EMAILJS_TEMPLATE_ID: template_oirni2p
        run: cd mon-portfolio && npm install && npm run build

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-eu.ionos.space
          project-id: c179ac81-c1a4-4354-89d0-b19be95e97ba
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/vitrine/config.yaml
          action: upload
